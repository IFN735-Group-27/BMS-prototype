<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Dashboard</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="css/tokens.css" rel="stylesheet">
	<link href="css/shell.css" rel="stylesheet">
	<link href="css/prototype_list.css" rel="stylesheet">
	<link href="prototype_ui.css" rel="stylesheet">
	<style>
		/* Financial Dashboard prototype (mirrors dost-bms-web dashboard_page.jsx) */
		.dashboard-page {
			padding: var(--space-6);
			max-width: 1440px;
			margin: 0 auto;
			width: 100%;
		}

		.dashboard-page-header h1 {
			font-size: 1.5rem;
			font-weight: 700;
			margin: 0;
		}

		.dashboard-tabs {
			display: flex;
			flex-wrap: wrap;
			gap: var(--space-2);
			border-bottom: 1px solid var(--color-border);
		}

		.dashboard-tabs__btn {
			border: none;
			background: transparent;
			padding: 10px 16px;
			font-size: 13px;
			font-weight: 600;
			color: var(--color-text-secondary);
			border-bottom: 2px solid transparent;
			margin-bottom: -1px;
			cursor: pointer;
		}

		.dashboard-tabs__btn:hover {
			color: var(--color-primary);
		}

		.dashboard-tabs__btn--active {
			color: var(--color-primary);
			border-bottom-color: var(--color-primary);
		}

		.dashboard-filter-label {
			font-size: 12px;
			font-weight: 600;
			color: var(--color-text-secondary);
			margin-bottom: var(--space-2);
		}

		.dashboard-section {
			margin-bottom: var(--space-8);
		}

		.dashboard-section__title {
			letter-spacing: -0.02em;
			font-weight: 700;
			color: var(--color-text-primary);
		}

		.dashboard-panel__toolbar {
			padding-bottom: var(--space-4);
			margin-bottom: var(--space-4);
			border-bottom: 1px solid var(--color-border);
		}

		.dashboard-panel__chart-title {
			font-size: 12px;
			font-weight: 600;
			color: var(--color-text-secondary);
			text-transform: uppercase;
			letter-spacing: 0.04em;
			margin-bottom: var(--space-3);
		}

		.dashboard-chart-card {
			height: 100%;
			border-radius: var(--radius-lg);
			border: 1px solid var(--color-border);
			background: var(--surface-2);
			padding: var(--space-4);
		}

		.dashboard-chart {
			position: relative;
			width: 100%;
			height: 320px;
		}

		.dashboard-chart--small {
			height: 260px;
		}

		.dashboard-status-card {
			position: relative;
			background: var(--color-surface);
			border: 1px solid var(--color-border);
			border-radius: var(--radius-lg);
			padding: var(--space-5);
			box-shadow: var(--shadow-1);
			min-height: 7.5rem;
			transition: box-shadow var(--transition-base), transform var(--transition-fast);
		}

		.dashboard-status-card:hover {
			box-shadow: var(--shadow-2);
			transform: translateY(-1px);
		}

		.dashboard-status-card::before {
			content: '';
			position: absolute;
			left: 0;
			top: var(--space-4);
			bottom: var(--space-4);
			width: 3px;
			border-radius: 999px;
			background: var(--color-border);
		}

		.dashboard-status-card--pending::before { background: var(--warn); }
		.dashboard-status-card--reviewed::before { background: var(--ok); }
		.dashboard-status-card--returned::before { background: var(--err); }
		.dashboard-status-card--consolidated::before { background: var(--color-primary); }

		.dashboard-status-card__value {
			font-size: 2rem;
			font-weight: 700;
			font-variant-numeric: tabular-nums;
			margin-top: var(--space-3);
		}

		.dashboard-metric-card {
			position: relative;
			background: var(--color-surface);
			border: 1px solid var(--color-border);
			border-radius: var(--radius-lg);
			padding: var(--space-5);
			box-shadow: var(--shadow-1);
			border-left: 4px solid var(--metric-accent, var(--color-border));
			height: 100%;
		}

		.dashboard-metric-card__label {
			font-size: 12px;
			font-weight: 600;
			text-transform: uppercase;
			letter-spacing: 0.04em;
			color: var(--color-text-secondary);
		}

		.dashboard-metric-card__value {
			font-size: 1.35rem;
			font-weight: 700;
			font-variant-numeric: tabular-nums;
		}

		.dashboard-metric-card__subtitle {
			font-size: 12px;
			color: var(--color-text-muted);
		}

		.status-badge--reviewed { background: var(--ok-bg); color: #15803d; border: 1px solid #bbf7d0; }
		.status-badge--consolidated { background: var(--brand-50); color: var(--color-primary); border: 1px solid var(--brand-100); }

		.dashboard-chart-note {
			font-size: 12px;
			color: var(--color-text-muted);
			text-align: right;
		}

		.dashboard-rate--green { color: var(--ok); font-weight: 600; font-variant-numeric: tabular-nums; }
		.dashboard-rate--amber { color: var(--warn); font-weight: 600; font-variant-numeric: tabular-nums; }
		.dashboard-rate--red { color: var(--err); font-weight: 600; font-variant-numeric: tabular-nums; }
	</style>
</head>
<body>
	<div class="app-shell">
		<header class="app-header" aria-label="Application header">
			<div class="app-header__inner">
				<a href="dashboard.html" class="app-header__brand">
					<img class="app-header__brand-mark" src="images/dost_logo.png" alt="DOST logo">
					<span>Budget Management System</span>
				</a>
				<nav class="app-header__nav" aria-label="Main navigation">
					<a class="app-header__link app-header__link--active" href="dashboard.html">Dashboard</a>
					<a class="app-header__link" href="budget_request_detail.html">Budget Requests</a>
					<a class="app-header__link" href="internal_review.html">Internal Review</a>
					<a class="app-header__link" href="unified_budget_list.html">Unified Budget</a>
					<a class="app-header__link" href="system_config.html">System Config</a>
				</nav>
				<div class="app-header__actions">
					<span class="app-header__user d-none d-md-inline">User · Agency Name</span>
					<div class="app-header__avatar" aria-hidden="true">MS</div>
				</div>
			</div>
		</header>

		<main class="app-main" id="db-app-root" aria-live="polite"></main>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
	<script src="prototype_ui.js"></script>
	<script src="js/data/budget_requests_data.js"></script>
	<script src="js/data/dashboard_data.js"></script>
	<script src="js/apps/dashboard_app.js"></script>
</body>
</html>
