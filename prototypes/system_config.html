<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>System Config</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="css/tokens.css" rel="stylesheet">
	<link href="css/shell.css" rel="stylesheet">
	<link href="css/prototype_list.css" rel="stylesheet">
	<link href="prototype_ui.css" rel="stylesheet">
	<style>
		.sc-user-email { display: block; font-size: 12px; color: var(--color-text-muted); }
		.sc-form-hint { font-size: 12px; color: var(--color-text-muted); }
		.sc-form-error { font-size: 12px; color: #b91c1c; margin-top: 4px; }
	</style>
</head>
<body>
	<div class="app-shell">
		<header class="app-header" aria-label="Application header">
			<div class="app-header__inner">
				<a href="budget_request_detail.html" class="app-header__brand">
					<img class="app-header__brand-mark" src="images/dost_logo.png" alt="DOST logo">
					<span>Budget Management System</span>
				</a>
				<nav class="app-header__nav" aria-label="Main navigation">
					<a class="app-header__link" href="dashboard.html">Dashboard</a>
					<a class="app-header__link" href="budget_request_detail.html">Budget Requests</a>
					<a class="app-header__link" href="internal_review.html">Internal Review</a>
					<a class="app-header__link" href="unified_budget_list.html">Unified Budget</a>
					<a class="app-header__link app-header__link--active" href="system_config.html">System Config</a>
				</nav>
				<div class="app-header__actions">
					<span class="app-header__user d-none d-md-inline">Admin · Main Administrator</span>
					<div class="app-header__avatar" aria-hidden="true">RM</div>
				</div>
			</div>
		</header>

		<main class="app-main" id="sc-app-root" aria-live="polite"></main>
	</div>

	<div class="modal fade" id="user-form-modal" tabindex="-1" aria-labelledby="user-form-modal-label" aria-hidden="true">
		<div class="modal-dialog modal-lg">
			<div class="modal-content">
				<div class="modal-header">
					<h5 class="modal-title" id="user-form-modal-label">New User</h5>
					<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
				</div>
				<div class="modal-body" id="user-form-modal-body"></div>
				<div class="modal-footer">
					<button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
					<button type="button" class="btn btn-primary" id="btn-save-user">Create User</button>
				</div>
			</div>
		</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<script src="prototype_ui.js"></script>
	<script src="js/data/users_data.js"></script>
	<script>
		/**
		*System Name: Budget Management System
		*Module Name: system_config
		*
		*Purpose of this file:
		*Prototype for system configuration — user account management.
		*
		*Author: none
		*
		*Copyright (C) 2026
		*by the Department of Science and Technology - Central Office
		*
		*All rights reserved.
		*/


		var state = {
			filters: { search: '', userGroup: '', status: '' },
			appliedFilters: { search: '', userGroup: '', status: '' },
			form: {
				fullName: '',
				loginId: '',
				mainUserGroup: '',
				role: '',
				agencyOffice: ''
			},
			formErrors: {}
		};

		var elAppRoot = document.getElementById('sc-app-root');
		var userFormModal = null;

		var escapeHtml = PrototypeUi.escapeHtml;

		function formatTimestamp(strIso)
		{
			return PrototypeUi.formatTimestamp(strIso, '—');
		}

		function getUserGroupLabel(strGroupId)
		{
			var objGroup = USER_GROUPS.find(function(g) { return g.id === strGroupId; });
			return objGroup ? objGroup.label : strGroupId;
		}

		function getRoleLabel(strRoleId)
		{
			var objRole = USER_ROLES.find(function(r) { return r.id === strRoleId; });
			return objRole ? objRole.label : strRoleId;
		}

		function getRolesForGroup(strGroupId)
		{
			return USER_ROLES.filter(function(objRole)
			{
				return objRole.groupId === strGroupId;
			});
		}

		function roleRequiresAgency(strRoleId)
		{
			var objRole = USER_ROLES.find(function(r) { return r.id === strRoleId; });
			return objRole ? objRole.requiresAgency === true : false;
		}

		function isValidLoginId(strLoginId)
		{
			var strTrimmed = String(strLoginId || '').trim();
			if (strTrimmed.length < 3 || strTrimmed.length > MAX_LOGIN_LENGTH)
			{
				return false;
			}
			return /^[A-Za-z0-9._@+-]+$/.test(strTrimmed);
		}

		function isValidFullName(strName)
		{
			var strTrimmed = String(strName || '').trim();
			if (strTrimmed.length < 2 || strTrimmed.length > MAX_NAME_LENGTH)
			{
				return false;
			}
			return /^[A-Za-z0-9 .,'-]+$/.test(strTrimmed);
		}

		function filterUsers()
		{
			var f = state.appliedFilters;
			var strSearch = String(f.search || '').trim().toLowerCase();
			return USERS_LIST.filter(function(objUser)
			{
				var blnSearch = !strSearch
					|| objUser.fullName.toLowerCase().indexOf(strSearch) >= 0
					|| objUser.loginId.toLowerCase().indexOf(strSearch) >= 0
					|| getUserGroupLabel(objUser.mainUserGroup).toLowerCase().indexOf(strSearch) >= 0
					|| getRoleLabel(objUser.role).toLowerCase().indexOf(strSearch) >= 0
					|| String(objUser.agencyOffice || '').toLowerCase().indexOf(strSearch) >= 0;
				var blnGroup = !f.userGroup || objUser.mainUserGroup === f.userGroup;
				var blnStatus = !f.status || objUser.status === f.status;
				return blnSearch && blnGroup && blnStatus;
			});
		}

		function renderUserForm()
		{
			var arrRoles = state.form.mainUserGroup ? getRolesForGroup(state.form.mainUserGroup) : [];
			var blnShowAgency = roleRequiresAgency(state.form.role);
			var strGroupOptions = '<option value="">Select user group</option>' + USER_GROUPS.map(function(objGroup)
			{
				var strSel = state.form.mainUserGroup === objGroup.id ? ' selected' : '';
				return '<option value="' + escapeHtml(objGroup.id) + '"' + strSel + '>' + escapeHtml(objGroup.label) + '</option>';
			}).join('');
			var strRoleOptions = '<option value="">Select role</option>' + arrRoles.map(function(objRole)
			{
				var strSel = state.form.role === objRole.id ? ' selected' : '';
				return '<option value="' + escapeHtml(objRole.id) + '"' + strSel + '>' + escapeHtml(objRole.label) + '</option>';
			}).join('');
			var strAgencyOptions = '<option value="">Select agency or office</option>' + AGENCY_OPTIONS.map(function(strAgency)
			{
				var strSel = state.form.agencyOffice === strAgency ? ' selected' : '';
				return '<option value="' + escapeHtml(strAgency) + '"' + strSel + '>' + escapeHtml(strAgency) + '</option>';
			}).join('');

			function renderFieldError(strKey)
			{
				if (!state.formErrors[strKey]) return '';
				return '<div class="sc-form-error">' + escapeHtml(state.formErrors[strKey]) + '</div>';
			}

			return '<p class="sc-form-hint mb-4">Required account information includes name, email/username, main user group, role, and associated agency or office where applicable.</p>' +
				'<div class="row g-3">' +
					'<div class="col-md-6">' +
						'<label class="form-label fw-semibold" for="user-full-name">Full Name <span class="text-danger">*</span></label>' +
						'<input type="text" class="form-control' + (state.formErrors.fullName ? ' is-invalid' : '') + '" id="user-full-name" maxlength="' + MAX_NAME_LENGTH + '" value="' + escapeHtml(state.form.fullName) + '">' +
						renderFieldError('fullName') +
					'</div>' +
					'<div class="col-md-6">' +
						'<label class="form-label fw-semibold" for="user-login-id">Email / Username <span class="text-danger">*</span></label>' +
						'<input type="text" class="form-control' + (state.formErrors.loginId ? ' is-invalid' : '') + '" id="user-login-id" maxlength="' + MAX_LOGIN_LENGTH + '" value="' + escapeHtml(state.form.loginId) + '" autocomplete="username">' +
						renderFieldError('loginId') +
					'</div>' +
					'<div class="col-md-6">' +
						'<label class="form-label fw-semibold" for="user-main-group">Main User Group <span class="text-danger">*</span></label>' +
						'<select class="form-select' + (state.formErrors.mainUserGroup ? ' is-invalid' : '') + '" id="user-main-group">' + strGroupOptions + '</select>' +
						renderFieldError('mainUserGroup') +
					'</div>' +
					'<div class="col-md-6">' +
						'<label class="form-label fw-semibold" for="user-role">Role <span class="text-danger">*</span></label>' +
						'<select class="form-select' + (state.formErrors.role ? ' is-invalid' : '') + '" id="user-role"' + (state.form.mainUserGroup ? '' : ' disabled') + '>' + strRoleOptions + '</select>' +
						renderFieldError('role') +
					'</div>' +
					(blnShowAgency ?
						'<div class="col-12">' +
							'<label class="form-label fw-semibold" for="user-agency-office">Associated Agency / Office <span class="text-danger">*</span></label>' +
							'<select class="form-select' + (state.formErrors.agencyOffice ? ' is-invalid' : '') + '" id="user-agency-office">' + strAgencyOptions + '</select>' +
							'<div class="sc-form-hint mt-1">Required for requester accounts.</div>' +
							renderFieldError('agencyOffice') +
						'</div>' : '') +
				'</div>';
		}

		function renderListPage()
		{
			var arrUsers = filterUsers();
			var strRows = arrUsers.map(function(objUser)
			{
				var strAgency = objUser.agencyOffice ? escapeHtml(objUser.agencyOffice) : '—';
				var strStatusClass = objUser.status === 'Active' ? 'status-badge--active' : 'status-badge--inactive';
				return '<tr>' +
					'<td class="fw-semibold">' + escapeHtml(objUser.fullName) + '<span class="sc-user-email">' + escapeHtml(objUser.loginId) + '</span></td>' +
					'<td>' + escapeHtml(getUserGroupLabel(objUser.mainUserGroup)) + '</td>' +
					'<td>' + escapeHtml(getRoleLabel(objUser.role)) + '</td>' +
					'<td>' + strAgency + '</td>' +
					'<td><span class="status-badge ' + strStatusClass + '">' + escapeHtml(objUser.status) + '</span></td>' +
					'<td>' + escapeHtml(formatTimestamp(objUser.lastUpdated)) + '</td>' +
				'</tr>';
			}).join('');

			if (!strRows)
			{
				strRows = '<tr><td colspan="6" class="text-center text-muted py-4">No users match the current filters.</td></tr>';
			}

			var strGroupFilter = '<option value="">All</option>' + USER_GROUPS.map(function(objGroup)
			{
				var strSel = state.filters.userGroup === objGroup.id ? ' selected' : '';
				return '<option value="' + escapeHtml(objGroup.id) + '"' + strSel + '>' + escapeHtml(objGroup.label) + '</option>';
			}).join('');

			elAppRoot.innerHTML =
				'<div class="br-list-page">' +
					'<header class="br-list-page__header">' +
						'<div>' +
							'<h1>System Config</h1>' +
							'<p>Manage user accounts, access groups, and role assignments.</p>' +
						'</div>' +
						'<button type="button" class="btn btn-primary btn-sm fw-semibold" id="btn-new-user">New User</button>' +
					'</header>' +
					'<div class="br-card">' +
						'<div class="br-filters br-filters--config">' +
							'<div><label class="form-label small" for="filter-search">Search</label><input type="search" class="form-control form-control-sm" id="filter-search" placeholder="Name, email, group, role, agency..." value="' + escapeHtml(state.filters.search) + '"></div>' +
							'<div><label class="form-label small" for="filter-group">User Group</label><select class="form-select form-select-sm" id="filter-group">' + strGroupFilter + '</select></div>' +
							'<div><label class="form-label small" for="filter-status">Status</label><select class="form-select form-select-sm" id="filter-status">' +
								'<option value="">All</option>' +
								'<option value="Active"' + (state.filters.status === 'Active' ? ' selected' : '') + '>Active</option>' +
								'<option value="Inactive"' + (state.filters.status === 'Inactive' ? ' selected' : '') + '>Inactive</option>' +
							'</select></div>' +
							'<div class="br-filter-actions">' +
								'<button type="button" class="btn btn-primary btn-sm" id="btn-apply-filters">Apply Filters</button>' +
								'<button type="button" class="btn btn-outline-secondary btn-sm" id="btn-clear-filters">Clear Filters</button>' +
							'</div>' +
						'</div>' +
						'<div class="br-table-wrap">' +
							'<table class="br-table">' +
								'<thead><tr>' +
									'<th>Name / Login</th>' +
									'<th>Main User Group</th>' +
									'<th>Role</th>' +
									'<th>Agency / Office</th>' +
									'<th>Status</th>' +
									'<th>Last Updated</th>' +
								'</tr></thead>' +
								'<tbody>' + strRows + '</tbody>' +
							'</table>' +
						'</div>' +
						'<div class="list-pagination">' +
							'<span>Showing ' + arrUsers.length + ' user' + (arrUsers.length === 1 ? '' : 's') + '</span>' +
						'</div>' +
					'</div>' +
				'</div>';
		}

		function resetUserForm()
		{
			state.form = {
				fullName: '',
				loginId: '',
				mainUserGroup: '',
				role: '',
				agencyOffice: ''
			};
			state.formErrors = {};
		}

		function openNewUserModal()
		{
			resetUserForm();
			document.getElementById('user-form-modal-label').textContent = 'New User';
			document.getElementById('user-form-modal-body').innerHTML = renderUserForm();
			bindUserFormEvents();
			userFormModal.show();
		}

		function syncUserFormFromDom()
		{
			var elName = document.getElementById('user-full-name');
			var elLogin = document.getElementById('user-login-id');
			var elGroup = document.getElementById('user-main-group');
			var elRole = document.getElementById('user-role');
			var elAgency = document.getElementById('user-agency-office');
			if (elName) state.form.fullName = elName.value;
			if (elLogin) state.form.loginId = elLogin.value;
			if (elGroup) state.form.mainUserGroup = elGroup.value;
			if (elRole) state.form.role = elRole.value;
			if (elAgency) state.form.agencyOffice = elAgency.value;
		}

		function validateUserForm()
		{
			syncUserFormFromDom();
			state.formErrors = {};
			var blnValid = true;

			if (!isValidFullName(state.form.fullName))
			{
				state.formErrors.fullName = 'Enter a valid full name (2–120 characters).';
				blnValid = false;
			}

			if (!isValidLoginId(state.form.loginId))
			{
				state.formErrors.loginId = 'Enter a valid email or username.';
				blnValid = false;
			}
			else if (USERS_LIST.some(function(u) { return u.loginId.toLowerCase() === state.form.loginId.trim().toLowerCase(); }))
			{
				state.formErrors.loginId = 'This email or username is already in use.';
				blnValid = false;
			}

			if (!state.form.mainUserGroup)
			{
				state.formErrors.mainUserGroup = 'Select a main user group.';
				blnValid = false;
			}

			if (!state.form.role)
			{
				state.formErrors.role = 'Select a role.';
				blnValid = false;
			}
			else
			{
				var arrAllowed = getRolesForGroup(state.form.mainUserGroup);
				if (!arrAllowed.some(function(r) { return r.id === state.form.role; }))
				{
					state.formErrors.role = 'Selected role is not valid for this user group.';
					blnValid = false;
				}
			}

			if (roleRequiresAgency(state.form.role))
			{
				if (!state.form.agencyOffice)
				{
					state.formErrors.agencyOffice = 'Select the associated agency or office.';
					blnValid = false;
				}
			}

			return blnValid;
		}

		function saveNewUser()
		{
			if (!validateUserForm())
			{
				document.getElementById('user-form-modal-body').innerHTML = renderUserForm();
				bindUserFormEvents();
				return;
			}

			var strAgency = roleRequiresAgency(state.form.role) ? state.form.agencyOffice : '';
			USERS_LIST.unshift({
				id: 'usr-' + Date.now(),
				fullName: state.form.fullName.trim(),
				loginId: state.form.loginId.trim(),
				mainUserGroup: state.form.mainUserGroup,
				role: state.form.role,
				agencyOffice: strAgency,
				status: 'Active',
				lastUpdated: new Date().toISOString()
			});

			userFormModal.hide();
			resetUserForm();
			renderListPage();
			bindListEvents();
			window.alert('User account created successfully.');
		}

		function bindUserFormEvents()
		{
			var elGroup = document.getElementById('user-main-group');
			if (elGroup)
			{
				elGroup.onchange = function()
				{
					syncUserFormFromDom();
					state.form.role = '';
					state.form.agencyOffice = '';
					document.getElementById('user-form-modal-body').innerHTML = renderUserForm();
					bindUserFormEvents();
				};
			}

			var elRole = document.getElementById('user-role');
			if (elRole)
			{
				elRole.onchange = function()
				{
					syncUserFormFromDom();
					if (!roleRequiresAgency(state.form.role))
					{
						state.form.agencyOffice = '';
					}
					document.getElementById('user-form-modal-body').innerHTML = renderUserForm();
					bindUserFormEvents();
				};
			}

			var elSave = document.getElementById('btn-save-user');
			if (elSave)
			{
				elSave.onclick = saveNewUser;
			}
		}

		function bindListEvents()
		{
			var elNew = document.getElementById('btn-new-user');
			if (elNew) elNew.onclick = openNewUserModal;

			var elSearch = document.getElementById('filter-search');
			if (elSearch)
			{
				elSearch.oninput = function() { state.filters.search = elSearch.value; };
			}

			var elGroup = document.getElementById('filter-group');
			if (elGroup)
			{
				elGroup.onchange = function() { state.filters.userGroup = elGroup.value; };
			}

			var elStatus = document.getElementById('filter-status');
			if (elStatus)
			{
				elStatus.onchange = function() { state.filters.status = elStatus.value; };
			}

			var elApply = document.getElementById('btn-apply-filters');
			if (elApply)
			{
				elApply.onclick = function()
				{
					state.appliedFilters = {
						search: state.filters.search,
						userGroup: state.filters.userGroup,
						status: state.filters.status
					};
					renderListPage();
					bindListEvents();
				};
			}

			var elClear = document.getElementById('btn-clear-filters');
			if (elClear)
			{
				elClear.onclick = function()
				{
					state.filters = { search: '', userGroup: '', status: '' };
					state.appliedFilters = { search: '', userGroup: '', status: '' };
					renderListPage();
					bindListEvents();
				};
			}
		}

		function initPage()
		{
			userFormModal = new bootstrap.Modal(document.getElementById('user-form-modal'));
			renderListPage();
			bindListEvents();
		}

		initPage();
	</script>
</body>
</html>
