<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Budget Requests</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="css/tokens.css" rel="stylesheet">
	<link href="css/shell.css" rel="stylesheet">
	<link href="css/prototype_list.css" rel="stylesheet">
	<link href="prototype_ui.css" rel="stylesheet">
	<style>
		/* Budget Request Detail shell */
		.br-page-toolbar {
			display: flex;
			align-items: center;
			gap: var(--space-2);
			padding: var(--space-3) var(--space-6);
			border-bottom: 1px solid var(--color-border);
			background: var(--color-surface);
		}

		.br-detail-shell {
			display: flex;
			flex-direction: column;
			min-height: calc(100vh - var(--topbar-h) - 53px);
			background: var(--color-bg);
		}

		.br-detail-header {
			padding: var(--space-4) var(--space-6) 0;
		}

		.br-detail-header__inner {
			background: var(--color-surface);
			border: 1px solid var(--color-border);
			border-radius: var(--radius-lg);
			box-shadow: var(--shadow-1);
			padding: var(--pad-card);
		}

		.br-wizard-stepper {
			padding: var(--space-4) var(--space-6);
		}

		.br-wizard-stepper__list {
			display: flex;
			flex-wrap: wrap;
			gap: var(--space-2);
			list-style: none;
			margin: 0;
			padding: 0;
		}

		.br-wizard-stepper__btn {
			border: 1px solid var(--color-border);
			background: var(--color-surface);
			border-radius: var(--radius);
			padding: 8px 14px;
			font-size: 13px;
			font-weight: 600;
			color: var(--color-text-secondary);
			cursor: pointer;
			transition: all var(--transition-fast);
		}

		.br-wizard-stepper__btn:hover {
			border-color: var(--color-primary);
			color: var(--color-primary);
		}

		.br-wizard-stepper__btn--active {
			background: var(--color-primary);
			border-color: var(--color-primary);
			color: #fff;
		}

		.br-wizard-stepper__btn--hidden {
			display: none;
		}

		.br-wizard-stepper--tabs {
			padding-bottom: 0;
		}

		.br-detail-tabs {
			display: flex;
			flex-wrap: wrap;
			gap: var(--space-2);
			border-bottom: 1px solid var(--color-border);
			padding-bottom: 0;
		}

		.br-detail-tabs__btn {
			border: none;
			background: transparent;
			padding: 10px 16px;
			font-size: 13px;
			font-weight: 600;
			color: var(--color-text-secondary);
			border-bottom: 2px solid transparent;
			margin-bottom: -1px;
			cursor: pointer;
		}

		.br-detail-tabs__btn:hover {
			color: var(--color-primary);
		}

		.br-detail-tabs__btn--active {
			color: var(--color-primary);
			border-bottom-color: var(--color-primary);
		}

		.br-detail-body {
			display: flex;
			flex: 1;
			gap: 0;
			padding: 0 var(--space-6) var(--space-6);
			align-items: stretch;
		}

		.br-wizard-content {
			flex: 1;
			min-width: 0;
		}

		.br-context-panel {
			width: 320px;
			flex-shrink: 0;
			padding-left: var(--space-4);
			display: flex;
			flex-direction: column;
			gap: var(--space-4);
		}

		.br-context-panel--summary-hidden {
			display: none;
		}

		.br-detail-body--step2 .br-wizard-content {
			display: flex;
			flex-direction: column;
			flex: 1;
			min-width: 0;
			gap: var(--space-4);
		}

		.br-step-projects {
			display: flex;
			flex-direction: column;
			gap: var(--space-4);
			flex: 1;
			min-width: 0;
		}

		.br-detail-body--step2 .br-wizard-content__main {
			flex: 1;
			min-width: 0;
			display: flex;
			gap: var(--space-4);
		}

		.br-detail-footer {
			position: sticky;
			bottom: 0;
			z-index: 10;
			padding: var(--space-4) var(--space-6);
			border-top: 1px solid var(--color-border);
			background: var(--color-surface);
			display: flex;
			justify-content: flex-end;
			gap: var(--space-2);
			box-shadow: 0 -2px 8px rgba(10, 14, 40, 0.04);
		}

		/* Review Workflow */
		.workflow-stack {
			display: flex;
			flex-direction: column;
			align-items: center;
			flex-shrink: 0;
		}

		.workflow-node {
			width: 28px;
			height: 28px;
			border-radius: 50%;
			display: flex;
			align-items: center;
			justify-content: center;
			flex-shrink: 0;
			font-size: 13px;
		}

		.workflow-node-done { background: var(--color-primary); color: #fff; }
		.workflow-node-locked { background: transparent; border: 2px solid #dee2e6; color: var(--color-text-muted); }
		.workflow-node-current { background: #92400e; color: #fff; }

		.workflow-connector {
			width: 2px;
			flex-grow: 1;
			min-height: 28px;
			margin: 4px 0;
		}

		.workflow-connector-done { background: var(--color-primary); }
		.workflow-connector-locked { background: #dee2e6; }

		.workflow-title { font-size: 14px; margin-bottom: 2px; }
		.workflow-status { font-size: 12px; margin-bottom: 0; }
		.workflow-meta, .workflow-actor { font-size: 12px; margin-bottom: 0; }

		/* Step 2 layout */
		.project-navigator {
			width: 260px;
			flex-shrink: 0;
		}

		.project-nav-card {
			border: 1px solid var(--color-border);
			border-radius: var(--radius);
			padding: var(--space-3);
			margin-bottom: var(--space-2);
			cursor: pointer;
			transition: border-color var(--transition-fast);
		}

		.project-nav-card:hover { border-color: var(--color-primary); }

		.project-nav-card--selected {
			border-color: var(--color-primary);
			background: var(--color-primary-subtle);
		}

		.project-workspace { flex: 1; min-width: 0; }

		.budget-summary-panel { width: 280px; flex-shrink: 0; }

		.budget-summary-panel > .br-card + .br-card {
			margin-top: var(--space-3);
		}

		.project-mini-stepper {
			display: flex;
			gap: var(--space-2);
			margin-bottom: var(--space-4);
			flex-wrap: wrap;
		}

		.project-mini-stepper__btn {
			border: 1px solid var(--color-border);
			background: var(--surface-2);
			border-radius: var(--radius);
			padding: 6px 12px;
			font-size: 12px;
			font-weight: 600;
			cursor: pointer;
		}

		.project-mini-stepper__btn--active {
			background: var(--color-primary);
			border-color: var(--color-primary);
			color: #fff;
		}

		/* Physical measures */
		.metric-accordion {
			border: 1px solid var(--color-border);
			border-radius: var(--radius);
			background: var(--surface-2);
			margin-bottom: var(--space-3);
			overflow: hidden;
		}

		.metric-accordion__header {
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: var(--space-2);
			background: var(--surface-2);
			padding: 6px 8px 6px 14px;
		}

		.metric-accordion--expanded .metric-accordion__header {
			border-bottom: 1px solid var(--color-border);
		}

		.metric-accordion__body {
			padding: var(--space-3);
			display: flex;
			flex-direction: column;
			gap: var(--space-3);
			background: var(--surface-2);
		}

		.metric-accordion__empty {
			font-size: 12px;
			color: var(--color-text-muted);
			text-align: center;
			padding: var(--space-2) 0;
		}

		.metric-accordion__toggle {
			flex: 1;
			min-width: 0;
			text-align: left;
			background: transparent;
			border: none;
			padding: 4px 0;
			font-weight: 600;
			cursor: pointer;
			color: inherit;
		}

		.metric-accordion__toggle:hover {
			color: var(--color-primary);
		}

		.metric-accordion__add-btn {
			flex-shrink: 0;
			white-space: nowrap;
		}

		.particular-chip {
			display: inline-block;
			padding: 4px 10px;
			border-radius: 999px;
			border: 1px solid var(--color-border);
			background: var(--color-surface);
			font-size: 12px;
			margin: 0 6px 6px 0;
			cursor: pointer;
		}

		.particular-chip--selected {
			background: var(--color-primary);
			border-color: var(--color-primary);
			color: #fff;
		}

		.particular-detail-card {
			border: 1px solid var(--color-border);
			border-radius: var(--radius);
			padding: var(--space-4);
			background: var(--color-surface);
		}

		/* Line item budget */
		.totals-grid {
			display: grid;
			grid-template-columns: repeat(4, 1fr);
			gap: var(--space-3);
			margin-bottom: var(--space-4);
		}

		.totals-card {
			border: 1px solid var(--color-border);
			border-radius: var(--radius);
			padding: var(--space-3);
			text-align: center;
		}

		.totals-card__label {
			font-size: 11px;
			text-transform: uppercase;
			letter-spacing: 0.06em;
			color: var(--color-text-muted);
		}

		.totals-card__value {
			font-size: 18px;
			font-weight: 700;
		}

		.totals-card--ps .totals-card__value { color: var(--ps); }
		.totals-card--mooe .totals-card__value { color: var(--mooe); }
		.totals-card--co .totals-card__value { color: var(--co); }

		.allotment-group { margin-bottom: var(--space-4); }

		.allotment-group__header {
			font-weight: 700;
			font-size: 13px;
			text-transform: uppercase;
			letter-spacing: 0.05em;
			margin-bottom: var(--space-2);
		}

		.allotment-group--ps .allotment-group__header { color: var(--ps); }
		.allotment-group--mooe .allotment-group__header { color: var(--mooe); }
		.allotment-group--co .allotment-group__header { color: var(--co); }

		.line-item-row {
			display: grid;
			grid-template-columns: minmax(0, 1fr) auto;
			align-items: center;
			gap: var(--space-3);
			padding: 10px 0;
			border-bottom: 1px solid var(--line);
			font-size: 13px;
		}

		.line-item-row__desc {
			min-width: 0;
			word-break: break-word;
		}

		.line-item-row__meta {
			display: flex;
			align-items: center;
			justify-content: flex-end;
			flex-wrap: wrap;
			gap: var(--space-2);
		}

		.line-item-row__amount {
			font-weight: 600;
			white-space: nowrap;
		}

		.line-item-row__actions {
			display: flex;
			align-items: center;
			gap: var(--space-2);
			flex-shrink: 0;
		}

		.line-budget-toolbar {
			display: flex;
			justify-content: flex-end;
			margin-bottom: var(--space-3);
		}

		/* Version cards */
		.version-card {
			border: 1px solid var(--color-border);
			border-radius: var(--radius-lg);
			margin-bottom: var(--space-4);
			overflow: hidden;
		}

		.version-card__header {
			background: var(--surface-2);
			padding: var(--space-4);
			border-bottom: 1px solid var(--color-border);
		}

		.version-card__body {
			padding: var(--space-4);
		}

		.version-snapshot-section {
			margin-bottom: var(--space-4);
		}

		.version-snapshot-section h6 {
			font-size: 12px;
			text-transform: uppercase;
			letter-spacing: 0.06em;
			color: var(--color-primary);
			margin-bottom: var(--space-2);
		}

		.version-project-accordion {
			background: var(--color-surface);
		}

		.version-project-accordion .metric-accordion__header {
			padding: 10px 14px;
		}

		.version-project-accordion__total {
			flex-shrink: 0;
			color: var(--color-text-primary);
		}

		.version-accordion {
			border: 1px solid var(--color-border);
			border-radius: var(--radius-lg);
			margin-bottom: var(--space-3);
			overflow: hidden;
			background: var(--color-surface);
		}

		.version-accordion .metric-accordion__header {
			padding: 12px 16px;
			background: var(--surface-2);
		}

		.version-accordion__meta {
			font-size: 12px;
			color: var(--color-text-muted);
			margin-top: 4px;
		}

		.version-accordion__body-inner {
			padding: var(--space-4);
		}

		.br-readonly-banner {
			border-radius: var(--radius-md);
			padding: 10px 14px;
			font-size: 13px;
			margin-bottom: var(--space-4);
		}

		.br-readonly-banner--pending {
			background: var(--warn-bg);
			border: 1px solid color-mix(in oklch, var(--warn) 35%, var(--line));
			color: color-mix(in oklch, var(--warn) 70%, var(--ink));
		}

		.br-readonly-banner--reviewed {
			background: var(--ok-bg);
			border: 1px solid color-mix(in oklch, var(--ok) 35%, var(--line));
			color: color-mix(in oklch, var(--ok) 75%, var(--ink));
		}

		.br-readonly-banner--returned {
			background: var(--err-bg);
			border: 1px solid color-mix(in oklch, var(--err) 35%, var(--line));
			color: color-mix(in oklch, var(--err) 75%, var(--ink));
		}

		.br-attachment-card {
			border: 1px solid var(--color-border);
			border-radius: var(--radius-md);
			padding: 12px 14px;
			margin-bottom: var(--space-2);
			background: var(--color-surface);
		}

		.br-attachment-card__name {
			font-weight: 600;
			font-size: 14px;
		}

		.br-attachment-card__meta {
			font-size: 12px;
			color: var(--color-text-muted);
		}

		.br-justification-post {
			border: 1px solid var(--color-border);
			border-radius: var(--radius-md);
			padding: 12px 14px;
			margin-bottom: var(--space-2);
			background: var(--color-bg);
		}

		.br-justification-post__text {
			font-size: 14px;
			margin-bottom: 4px;
			white-space: pre-wrap;
		}

		.summary-toggle-btn {
			font-size: 12px;
			padding: 4px 8px;
		}

		.br-checklist__item {
			display: flex;
			align-items: flex-start;
			gap: 10px;
			padding: 5px 0;
			font-size: 13px;
			line-height: 1.4;
		}

		.br-checklist__label {
			color: var(--color-text-secondary);
		}

		.br-checklist__item--complete .br-checklist__label {
			color: var(--color-text-primary);
		}

		.br-checklist__item--pending .br-checklist__label {
			color: var(--color-text-muted);
		}

		.br-checklist__icon {
			width: 18px;
			height: 18px;
			display: inline-flex;
			align-items: center;
			justify-content: center;
			flex-shrink: 0;
			margin-top: 1px;
		}

		@media (max-width: 1200px) {
			.br-detail-body { flex-direction: column; }
			.br-context-panel { width: 100%; padding-left: 0; padding-top: var(--space-4); }
			.br-detail-body--step2 .br-wizard-content { flex-direction: column; }
			.br-detail-body--step2 .br-wizard-content__main { flex-direction: column; }
			.project-navigator, .budget-summary-panel { width: 100%; }
			.totals-grid { grid-template-columns: repeat(2, 1fr); }
		}

		@media (max-width: 992px) {
			.totals-grid { grid-template-columns: repeat(2, 1fr); }
		}

		@media (max-width: 768px) {
			.totals-grid {
				grid-template-columns: 1fr 1fr;
			}

			.totals-card__value {
				font-size: 16px;
			}

			.line-item-row {
				grid-template-columns: 1fr;
				align-items: start;
			}

			.line-item-row__meta {
				width: 100%;
				justify-content: space-between;
			}

			.metric-accordion__header {
				flex-wrap: wrap;
				padding: 8px 10px;
			}

			.metric-accordion__add-btn {
				margin-left: auto;
			}
		}

		@media (max-width: 480px) {
			.totals-grid {
				grid-template-columns: 1fr;
			}

			.line-budget-toolbar .btn {
				width: 100%;
			}
		}
	</style>
</head>
<body>
	<div class="app-shell">
		<header class="app-header" id="app-header">
			<div class="app-header__inner">
				<a class="app-header__brand" href="#" id="btn-nav-home">
					<img class="app-header__brand-mark" src="images/dost_logo.png" alt="DOST logo">
					<span>Budget Management System</span>
				</a>
				<nav class="app-header__nav" aria-label="Main navigation">
					<a class="app-header__link" href="dashboard.html">Dashboard</a>
					<a class="app-header__link app-header__link--active" href="budget_request_detail.html" id="btn-nav-budget-requests">Budget Requests</a>
					<a class="app-header__link" href="internal_review.html">Internal Review</a>
					<a class="app-header__link" href="unified_budget_list.html">Unified Budget</a>
					<a class="app-header__link" href="system_config.html">System Config</a>
				</nav>
				<div class="app-header__actions">
					<span class="app-header__user d-none d-md-inline">User · Agency Name</span>
					<div class="app-header__avatar" aria-hidden="true">MS</div>
				</div>
			</div>
		</header>

		<div class="app-main">
			<div id="br-list-view" aria-label="Budget requests list"></div>

			<div id="br-detail-view" class="d-none">
			<div class="br-page-toolbar">
				<button type="button" class="btn btn-link text-decoration-none text-secondary p-0" id="btn-back">← Back to Budget Requests</button>
				<h5 class="mb-0 fw-semibold" id="br-page-title">New Budget Request</h5>
			</div>

			<div class="br-detail-shell" id="br-detail-shell">
				<!-- Budget Request Header / status area -->
				<header class="br-detail-header" id="br-detail-header" aria-label="Budget request status"></header>

				<!-- Main wizard stepper -->
				<nav class="br-wizard-stepper" id="br-wizard-stepper" aria-label="Main wizard steps"></nav>

				<div class="br-detail-body" id="br-detail-body">
					<!-- Wizard content area -->
					<main class="br-wizard-content" id="br-wizard-content" aria-live="polite"></main>
					<!-- Right contextual panel (Review Workflow on steps 1 and 3) -->
					<aside class="br-context-panel" id="br-context-panel" aria-label="Contextual panel"></aside>
				</div>

				<!-- Footer actions -->
				<footer class="br-detail-footer" id="br-detail-footer" aria-label="Page actions"></footer>
			</div>
			</div>
		</div>
	</div>

	<div class="modal fade" id="expense-item-modal" tabindex="-1" aria-labelledby="expense-item-modal-label" aria-hidden="true">
		<div class="modal-dialog">
			<div class="modal-content">
				<div class="modal-header">
					<h5 class="modal-title" id="expense-item-modal-label">Add Expense Item</h5>
					<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
				</div>
				<div class="modal-body">
					<div class="mb-3">
						<label class="form-label" for="expense-category">Allotment Case</label>
						<select class="form-select" id="expense-category">
							<option value="PS">PS - Personal Services</option>
							<option value="MOOE">MOOE - Maintenance and Other Operating Expenses</option>
							<option value="CO">CO - Capital Outlay</option>
						</select>
					</div>
					<div class="mb-3" id="expense-item-field">
						<label class="form-label" for="expense-item-select">Expense Item</label>
						<select class="form-select" id="expense-item-select">
							<option value="">Select expense item</option>
						</select>
					</div>
					<div class="mb-3 d-none" id="expense-description-field">
						<label class="form-label" for="expense-description">Capital Item Description</label>
						<input type="text" class="form-control" id="expense-description" maxlength="255" placeholder="Enter equipment or capital item (manual entry for CO)">
						<div class="form-text">Capital Outlay items are enumerated manually per LIB guidelines.</div>
					</div>
					<div class="mb-3">
						<label class="form-label" for="expense-amount">Amount (PHP)</label>
						<input type="number" class="form-control" id="expense-amount" min="0" step="0.01" placeholder="Requested amount for this expense item">
					</div>
				</div>
				<div class="modal-footer">
					<button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
					<button type="button" class="btn btn-primary" id="btn-save-expense">Add Item</button>
				</div>
			</div>
		</div>
	</div>
