<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Unified Budget</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="css/tokens.css" rel="stylesheet">
	<link href="css/shell.css" rel="stylesheet">
	<link href="prototype_ui.css" rel="stylesheet">
	<style>
		.ub-page { padding: var(--space-6); max-width: 1440px; margin: 0 auto; width: 100%; }
		.ub-page-header { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: var(--space-4); margin-bottom: var(--space-6); }
		.ub-page-header h1 { font-size: 1.5rem; font-weight: 700; margin: 0 0 4px; }
		.ub-page-header p { margin: 0; color: var(--color-text-muted); font-size: 13px; }

		.br-readonly-banner {
			border-radius: var(--radius-md);
			padding: 10px 14px;
			font-size: 13px;
			margin-bottom: var(--space-4);
		}

		.br-readonly-banner--pending {
			background: var(--warn-bg);
			border: 1px solid color-mix(in oklch, var(--warn) 35%, var(--line));
			color: color-mix(in oklch, var(--warn) 70%, var(--ink));
		}

		.br-readonly-banner--reviewed {
			background: var(--ok-bg);
			border: 1px solid color-mix(in oklch, var(--ok) 35%, var(--line));
			color: color-mix(in oklch, var(--ok) 75%, var(--ink));
		}

		.br-readonly-banner--returned {
			background: var(--err-bg);
			border: 1px solid color-mix(in oklch, var(--err) 35%, var(--line));
			color: color-mix(in oklch, var(--err) 75%, var(--ink));
		}

		.br-attachment-card {
			border: 1px solid var(--color-border);
			border-radius: var(--radius-md);
			padding: 12px 14px;
			margin-bottom: var(--space-2);
			background: var(--color-surface);
		}

		.br-attachment-card__name {
			font-weight: 600;
			font-size: 14px;
		}

		.br-attachment-card__meta {
			font-size: 12px;
			color: var(--color-text-muted);
		}

		.br-justification-post {
			border: 1px solid var(--color-border);
			border-radius: var(--radius-md);
			padding: 12px 14px;
			margin-bottom: var(--space-2);
			background: var(--color-bg);
		}

		.br-justification-post__text {
			font-size: 14px;
			margin-bottom: 4px;
			white-space: pre-wrap;
		}

		.ub-ext-tracking-layout {
			display: grid;
			grid-template-columns: minmax(280px, 360px) 1fr;
			gap: var(--space-4);
			align-items: start;
		}

		.ub-ext-started-banner {
			border-left: 4px solid var(--color-primary);
		}

		.ub-ext-update-panel .text-brand {
			color: var(--color-primary);
		}

		.ub-ext-upload-zone {
			border: 2px dashed var(--color-border);
			border-radius: var(--radius-lg);
			padding: var(--space-5);
			text-align: center;
			cursor: pointer;
			transition: background var(--transition-fast);
		}

		.ub-ext-upload-zone:hover {
			background: var(--color-bg);
		}

		.ub-ext-upload-zone__icon {
			font-size: 28px;
			color: var(--color-text-muted);
			margin-bottom: var(--space-2);
		}

		.ub-ext-doc-row {
			display: flex;
			gap: var(--space-3);
			padding: var(--space-3) 0;
			border-bottom: 1px solid var(--color-border);
		}

		.ub-ext-doc-row__icon {
			font-size: 28px;
			flex-shrink: 0;
		}

		.ub-ext-doc-row__body {
			min-width: 0;
			flex: 1;
		}

		.ub-ext-stage-badge {
			display: inline-block;
			font-size: 11px;
			font-weight: 600;
			text-transform: uppercase;
			padding: 2px 8px;
			border-radius: 4px;
			background: var(--brand-50);
			color: var(--color-primary);
			border: 1px solid var(--brand-100);
		}

		@media (max-width: 992px) {
			.ub-ext-tracking-layout {
				grid-template-columns: 1fr;
			}
		}

		.ub-filters { display: grid; grid-template-columns: 1.4fr repeat(3, minmax(150px, 1fr)) auto; gap: var(--space-3); align-items: end; margin-bottom: var(--space-4); }
		.ub-filter-actions { display: flex; gap: var(--space-3); flex-wrap: wrap; }
		.br-table-wrap { overflow-x: auto; }
		.br-table { width: 100%; border-collapse: collapse; font-size: 13px; }
		.br-table th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--color-text-muted); padding: 10px 12px; border-bottom: 2px solid var(--color-border); white-space: nowrap; user-select: none; }
		.br-table th.br-table__sortable { cursor: pointer; }
		.br-table th.br-table__sortable:hover { color: var(--color-primary); }
		.br-table td { padding: 12px; border-bottom: 1px solid var(--color-border); vertical-align: middle; }
		.br-table tbody tr:hover { background: var(--color-primary-subtle); }
		.br-table .text-end { text-align: right; }

		.status-badge { border-radius: 6px; font-weight: 600; text-transform: uppercase; font-size: 11px; padding: 3px 10px; display: inline-flex; white-space: nowrap; }
		.status-badge--draft { background: #f3f4f6; color: #4b5563; border: 1px solid #d1d5db; }
		.status-badge--pending { background: var(--warn-bg); color: #b45309; border: 1px solid #fde68a; }
		.status-badge--approved { background: var(--ok-bg); color: #15803d; border: 1px solid #bbf7d0; }
		.status-badge--rejected { background: var(--err-bg); color: #b91c1c; border: 1px solid #fecaca; }
		.status-badge--stage { background: var(--brand-50); color: var(--color-primary); border: 1px solid var(--brand-100); }

		.ub-ref { font-weight: 600; color: var(--color-primary); }
		.ub-ref__title { display: block; font-size: 12px; font-weight: 400; color: var(--color-text-muted); margin-top: 2px; }
		.ub-pagination { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: var(--space-3); margin-top: var(--space-4); font-size: 13px; color: var(--color-text-muted); }
		.ub-action-menu { position: relative; display: inline-block; }
		.ub-action-menu__menu { position: absolute; right: 0; top: calc(100% + 4px); min-width: 140px; background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius); box-shadow: var(--shadow-1); padding: 4px 0; z-index: 20; display: none; }
		.ub-action-menu__menu--open { display: block; }
		.ub-action-menu__item { display: block; width: 100%; border: none; background: transparent; text-align: left; padding: 8px 14px; font-size: 13px; color: var(--color-text-primary); cursor: pointer; }
		.ub-action-menu__item:hover { background: var(--color-primary-subtle); }

		/* Detail wizard */
		.ub-page-toolbar { display: flex; align-items: center; gap: var(--space-2); padding: var(--space-3) var(--space-6); border-bottom: 1px solid var(--color-border); background: var(--color-surface); }
		.ub-detail-shell { display: flex; flex-direction: column; min-height: calc(100vh - var(--topbar-h) - 53px); background: var(--color-bg); }
		.ub-detail-header { padding: var(--space-4) var(--space-6) 0; }
		.ub-detail-header__inner { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); box-shadow: var(--shadow-1); padding: var(--pad-card); }
		.ub-wizard-stepper { padding: var(--space-4) var(--space-6); }
		.ub-wizard-stepper__list { display: flex; flex-wrap: wrap; gap: var(--space-2); list-style: none; margin: 0; padding: 0; }
		.ub-wizard-stepper__btn { border: 1px solid var(--color-border); background: var(--color-surface); border-radius: var(--radius); padding: 8px 14px; font-size: 13px; font-weight: 600; color: var(--color-text-secondary); cursor: pointer; transition: all var(--transition-fast); }
		.ub-wizard-stepper__btn:hover { border-color: var(--color-primary); color: var(--color-primary); }
		.ub-wizard-stepper__btn--active { background: var(--color-primary); border-color: var(--color-primary); color: #fff; }
		.ub-wizard-stepper__btn--hidden { display: none; }
		.ub-wizard-stepper--tabs { padding-bottom: 0; }
		.ub-detail-tabs {
			display: flex;
			flex-wrap: wrap;
			gap: var(--space-2);
			border-bottom: 1px solid var(--color-border);
			padding-bottom: 0;
		}
		.ub-detail-tabs__btn {
			border: none;
			background: transparent;
			padding: 10px 16px;
			font-size: 13px;
			font-weight: 600;
			color: var(--color-text-secondary);
			border-bottom: 2px solid transparent;
			margin-bottom: -1px;
			cursor: pointer;
		}
		.ub-detail-tabs__btn:hover { color: var(--color-primary); }
		.ub-detail-tabs__btn--active {
			color: var(--color-primary);
			border-bottom-color: var(--color-primary);
		}
		.ub-detail-body { display: flex; flex: 1; padding: 0 var(--space-6) var(--space-6); align-items: stretch; }
		.ub-wizard-content { flex: 1; min-width: 0; }
		.ub-context-panel { width: 320px; flex-shrink: 0; padding-left: var(--space-4); }
		.ub-context-panel--hidden { display: none; }
		.ub-detail-body--consolidation .ub-wizard-content { display: block; min-width: 0; }
		.ub-wizard-content__consolidation { display: flex; flex-direction: column; gap: var(--space-4); min-width: 0; }
		.ub-wizard-content__consolidation-body { display: flex; gap: var(--space-4); align-items: flex-start; min-width: 0; }
		.ub-detail-body--consolidation .ub-wizard-content__main { flex: 1; min-width: 0; }
		.ub-summary-panel { width: 320px; flex-shrink: 0; }
		.ub-detail-footer { position: sticky; bottom: 0; z-index: 10; padding: var(--space-4) var(--space-6); border-top: 1px solid var(--color-border); background: var(--color-surface); display: flex; justify-content: flex-end; gap: var(--space-2); box-shadow: 0 -2px 8px rgba(10, 14, 40, 0.04); }

		.workflow-stack { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
		.workflow-node { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 13px; }
		.workflow-node-done { background: var(--color-primary); color: #fff; }
		.workflow-node-locked { background: transparent; border: 2px solid #dee2e6; color: var(--color-text-muted); }
		.workflow-node-current { background: #92400e; color: #fff; }
		.workflow-node-rejected { background: #b91c1c; color: #fff; }
		.workflow-connector { width: 2px; flex-grow: 1; min-height: 28px; margin: 4px 0; }
		.workflow-connector-done { background: var(--color-primary); }
		.workflow-connector-locked { background: #dee2e6; }
		.workflow-title { font-size: 14px; margin-bottom: 2px; }
		.workflow-status, .workflow-meta, .workflow-actor { font-size: 12px; margin-bottom: 0; }

		.workflow-timeline-h {
			display: flex;
			align-items: flex-start;
			gap: 0;
			overflow-x: auto;
			padding-bottom: var(--space-2);
		}

		.workflow-timeline-h__item {
			flex: 1 1 0;
			min-width: 108px;
			text-align: center;
		}

		.workflow-timeline-h__rail {
			display: flex;
			align-items: center;
			margin-bottom: var(--space-2);
		}

		.workflow-timeline-h__line {
			flex: 1 1 auto;
			height: 2px;
			background: #dee2e6;
			min-width: 8px;
		}

		.workflow-timeline-h__line--done {
			background: var(--color-primary);
		}

		.workflow-timeline-h__line--spacer {
			background: transparent;
		}

		.workflow-timeline-h__item .workflow-node {
			flex-shrink: 0;
		}

		.workflow-timeline-h__body {
			padding: 0 6px;
		}

		.workflow-timeline-h__body .workflow-title {
			font-size: 13px;
			line-height: 1.3;
		}

		.workflow-timeline-h__body .workflow-actor {
			line-height: 1.35;
		}

		.ub-summary-panel > .br-card + .br-card { margin-top: var(--space-3); }
		.allotment-group { margin-bottom: var(--space-4); }
		.allotment-group__header { font-weight: 700; font-size: 13px; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: var(--space-2); }
		.allotment-group--ps .allotment-group__header { color: var(--ps); }
		.allotment-group--mooe .allotment-group__header { color: var(--mooe); }
		.allotment-group--co .allotment-group__header { color: var(--co); }

		.consolidation-table { width: 100%; border-collapse: collapse; font-size: 13px; }
		.consolidation-table th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--color-text-muted); padding: 10px 12px; border-bottom: 2px solid var(--color-border); white-space: nowrap; }
		.consolidation-table th.text-end, .consolidation-table td.text-end { text-align: right; }
		.consolidation-table td { padding: 10px 12px; border-bottom: 1px solid var(--color-border); vertical-align: top; }
		.consolidation-table__pillar-row td { background: var(--surface-2); font-weight: 700; }
		.consolidation-table__group-row td { background: var(--brand-50); font-weight: 600; }
		.consolidation-table__group-toggle { background: transparent; border: none; padding: 0; font-weight: inherit; cursor: pointer; color: inherit; text-align: left; }
		.consolidation-table__group-toggle:hover { color: var(--color-primary); }
		.consolidation-table__label--pillar { font-weight: 700; }
		.consolidation-table__label--category { padding-left: 1.25rem; font-weight: 600; }
		.consolidation-table__label--agency { padding-left: 2.5rem; }
		.consolidation-table__agency-cell a { font-weight: 600; text-decoration: none; color: var(--color-primary); }
		.consolidation-table__agency-cell a:hover { text-decoration: underline; }
		.consolidation-table__agency-ref { display: block; font-size: 11px; color: var(--color-text-muted); font-weight: 400; margin-top: 2px; }
		.consolidation-table__grand-row td { background: var(--color-primary-subtle); font-weight: 700; border-top: 2px solid var(--color-primary); }
		.consolidation-table__empty { color: var(--color-text-muted); }
		.consolidation-table__col-ps { color: var(--ps); }
		.consolidation-table__col-mooe { color: var(--mooe); }
		.consolidation-table__col-co { color: var(--co); }
		.consolidation-table tbody tr.consolidation-table__agency-row:hover { background: var(--color-primary-subtle); }

		.metric-accordion { border: 1px solid var(--color-border); border-radius: var(--radius); background: var(--surface-2); overflow: hidden; }
		.metric-accordion__header { display: flex; align-items: center; justify-content: space-between; gap: var(--space-2); background: var(--surface-2); padding: 8px 14px; }
		.metric-accordion--expanded .metric-accordion__header { border-bottom: 1px solid var(--color-border); }
		.metric-accordion__body { padding: var(--space-3); background: var(--color-surface); }
		.metric-accordion__toggle { flex: 1; min-width: 0; text-align: left; background: transparent; border: none; padding: 4px 0; font-weight: 600; cursor: pointer; color: inherit; }
		.metric-accordion__toggle:hover { color: var(--color-primary); }
		.consolidation-amount { font-weight: 600; white-space: nowrap; font-size: 13px; }

		.version-accordion {
			border: 1px solid var(--color-border);
			border-radius: var(--radius-lg);
			margin-bottom: var(--space-3);
			overflow: hidden;
			background: var(--color-surface);
		}

		.version-accordion .metric-accordion__header {
			padding: 12px 16px;
			background: var(--surface-2);
		}

		.version-accordion__meta {
			font-size: 12px;
			color: var(--color-text-muted);
			margin-bottom: var(--space-3);
		}

		.version-accordion__body-inner {
			padding: var(--space-4);
		}

		.version-card { border: 1px solid var(--color-border); border-radius: var(--radius-lg); margin-bottom: var(--space-4); overflow: hidden; }
		.version-card__header { background: var(--surface-2); padding: var(--space-4); border-bottom: 1px solid var(--color-border); }
		.version-card__body { padding: var(--space-4); }
		.version-snapshot-section { margin-bottom: var(--space-4); }
		.version-snapshot-section h6 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--color-primary); margin-bottom: var(--space-2); }
		.version-request-accordion .metric-accordion__header { padding: 10px 14px; }

		.consolidate-modal-summary { background: var(--color-primary-subtle); border-radius: var(--radius); padding: var(--space-3) var(--space-4); margin-bottom: var(--space-4); font-size: 13px; }

		@media (max-width: 1100px) {
			.ub-filters { grid-template-columns: 1fr 1fr; }
			.ub-filter-actions { grid-column: 1 / -1; justify-content: flex-end; }
			.ub-detail-body { flex-direction: column; }
			.ub-context-panel { width: 100%; padding-left: 0; padding-top: var(--space-4); }
			.ub-detail-body--consolidation .ub-wizard-content__consolidation-body { flex-direction: column; }
			.ub-summary-panel { width: 100%; }
		}
		@media (max-width: 576px) { .ub-filters { grid-template-columns: 1fr; } }
	</style>
</head>
<body>
	<div class="app-shell">
		<header class="app-header" aria-label="Application header">
			<div class="app-header__inner">
				<a href="budget_request_detail.html" class="app-header__brand">
					<img class="app-header__brand-mark" src="images/dost_logo.png" alt="DOST logo">
					<span>Budget Management System</span>
				</a>
				<nav class="app-header__nav" aria-label="Main navigation">
					<a class="app-header__link" href="dashboard.html">Dashboard</a>
					<a class="app-header__link" href="budget_request_detail.html">Budget Requests</a>
					<a class="app-header__link" href="internal_review.html">Internal Review</a>
					<a class="app-header__link app-header__link--active" href="unified_budget_list.html">Unified Budget</a>
					<a class="app-header__link" href="system_config.html">System Config</a>
				</nav>
				<div class="app-header__actions">
					<span class="app-header__user d-none d-md-inline">User · PDO</span>
					<div class="app-header__avatar" aria-hidden="true">BD</div>
				</div>
			</div>
		</header>

		<div class="app-main">
			<div id="ub-list-view" aria-label="Unified budget list"></div>
			<div id="ub-detail-view" class="d-none">
				<div class="ub-page-toolbar">
					<button type="button" class="btn btn-link text-decoration-none text-secondary p-0" id="btn-back">← Back to Unified Budget</button>
					<h5 class="mb-0 fw-semibold" id="ub-page-title">Unified Budget</h5>
				</div>
				<div class="ub-detail-shell">
					<header class="ub-detail-header" id="ub-detail-header" aria-label="Unified budget status"></header>
					<nav class="ub-wizard-stepper" id="ub-wizard-stepper" aria-label="Unified budget wizard steps"></nav>
					<div class="ub-detail-body" id="ub-detail-body">
						<main class="ub-wizard-content" id="ub-wizard-content" aria-live="polite"></main>
						<aside class="ub-context-panel" id="ub-context-panel" aria-label="Context panel"></aside>
					</div>
					<footer class="ub-detail-footer" id="ub-detail-footer" aria-label="Page actions"></footer>
				</div>
			</div>
		</div>
	</div>

	<div class="modal fade" id="consolidate-modal" tabindex="-1" aria-labelledby="consolidate-modal-label" aria-hidden="true">
		<div class="modal-dialog modal-lg modal-dialog-scrollable">
			<div class="modal-content">
				<div class="modal-header">
					<h5 class="modal-title" id="consolidate-modal-label">Consolidate Budget</h5>
					<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
				</div>
				<div class="modal-body" id="consolidate-modal-body"></div>
				<div class="modal-footer">
					<button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Close</button>
					<button type="button" class="btn btn-primary" id="btn-create-unified-budget">Create Unified Budget</button>
				</div>
			</div>
		</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<script src="prototype_ui.js"></script>
	<script src="js/data/unified_budget_data.js"></script>
	<script src="js/apps/unified_budget_app.js"></script>
</body>
</html>
